# Default profile when SPRING_PROFILES_ACTIVE env var is NOT set
spring.profiles.default=dev

# When 'dev' is active, also activate 'local' for real credentials
spring.profiles.group.dev=local

spring.application.name=ComplaintIQ

# ASYNC
app.async.core-pool-size=4
app.async.max-pool-size=10
app.async.queue-capacity=500
app.async.thread-name-prefix=ComplaintIQ-Async-

# SLA SCHEDULER
app.sla.scheduler.fixed-rate-ms=300000

# TICKET
app.ticket.prefix=CIQ
app.ticket.sequence-padding=5

# SWAGGER
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# SERVER
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# ACTUATOR
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# JACKSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=NON_NULL

# JPA defaults
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false