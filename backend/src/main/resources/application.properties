spring.profiles.active=dev,local
spring.application.name=ComplaintIQ

# DATABASE
# DATABASE (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/complaintiq_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.pool-name=ComplaintIQ-HikariPool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# GEMINI AI (Google)
app.gemini.api-key=YOUR_GEMINI_API_KEY_HERE
app.gemini.model=gemini-2.5-flash
app.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models

# JWT
app.jwt.secret=YOUR_BASE64_JWT_SECRET_HERE_GENERATE_WITH_openssl_rand_-hex_32
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-days=7

# MAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS_HERE
spring.mail.password=YOUR_GMAIL_APP_PASSWORD_HERE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ASYNC
app.async.core-pool-size=4
app.async.max-pool-size=10
app.async.queue-capacity=500
app.async.thread-name-prefix=ComplaintIQ-Async-

# SLA SCHEDULER
app.sla.scheduler.fixed-rate-ms=300000

# TICKET
app.ticket.prefix=CIQ
app.ticket.sequence-padding=5

# WEBSOCKET
app.websocket.allowed-origins=http://localhost:3000,http://localhost:8080,http://localhost:5173

# SWAGGER
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# SERVER
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ACTUATOR
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# LOGGING
logging.level.com.complaintiq=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.postgresql=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{ticketId}] %logger{36} - %msg%n
logging.file.name=logs/complaintiq-dev.log

# JACKSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=NON_NULL
