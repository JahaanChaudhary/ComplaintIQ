# ===== PROD PROFILE =====
# Used in production (Render deployment)

# DATABASE (Neon PostgreSQL ? values from Render env vars)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require&channel_binding=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (tuned for free tier)
spring.datasource.hikari.pool-name=ComplaintIQ-HikariPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# GEMINI AI (from Render env var)
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.model=gemini-2.5-flash
app.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models

# JWT (from Render env var)
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-days=7

# MAIL (from Render env vars)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# CORS (from Render env var FRONTEND_URL)
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# WEBSOCKET
app.websocket.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# LOGGING (less verbose for prod)
logging.level.root=INFO
logging.level.com.complaintiq=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN